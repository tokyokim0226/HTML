    <!-- tables -->
    <table>
      <thead>
        <caption> <h2>List of Numbers</h2> </caption>
        <!-- define a table row -->
        <tr> <!-- represent one horizontal row for the table-->
          <th>1</th>
          <th>2</th>
          <th>3</th>
        </tr>
      </thead>
      <tbody>
        <tr> <!-- represent one horizontal row for the table-->
          <td colspan = "2">one</td>
          <td>two</td>
          <td>three</td>
        </tr>

        <tr> <!-- represent one horizontal row for the table-->
          <td>four</td>
          <td>five</td>
          <td>six</td>
        </tr>
      </tbody>

    </table>
